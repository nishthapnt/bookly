openapi: 3.0.3

info:
  title: Bookly Provider API
  version: 1.0.0
  description: API contracts for provider discovery and profiles

paths:
  /api/providers:
    get:
      summary: List all providers
      description: Returns public profiles of all available providers

      responses:
        "200":
          description: List of provider profiles

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/Provider"

              examples:
                providers:
                  summary: Example list of providers

                  value:
                    - slug: sarah-williams
                      fullName: Sarah Williams
                      title: Senior Fitness Coach
                      bio: Helping people achieve sustainable fitness goals.
                      experienceYears: 8
                      skills:
                        - Strength Training
                        - Weight Loss
                        - Nutrition
                      location: New York
                      profileImage: https://example.com/images/sarah.jpg
                      pricePerSession: 75

                    - slug: david-chen
                      fullName: David Chen
                      title: Career Consultant
                      bio: Helping professionals transition into better careers.
                      experienceYears: 12
                      skills:
                        - Career Planning
                        - Resume Reviews
                        - Interview Coaching
                      location: San Francisco
                      profileImage: https://example.com/images/david.jpg
                      pricePerSession: 100

components:
  schemas:
    Provider:
      type: object

      required:
        - slug
        - fullName
        - title
        - bio
        - experienceYears
        - skills
        - location
        - profileImage
        - pricePerSession

      properties:
        slug:
          type: string
          example: sarah-williams

        fullName:
          type: string
          example: Sarah Williams

        title:
          type: string
          example: Senior Fitness Coach

        bio:
          type: string
          example: Helping people achieve sustainable fitness goals.

        experienceYears:
          type: integer
          example: 8

        skills:
          type: array

          items:
            type: string

          example:
            - Strength Training
            - Nutrition

        location:
          type: string
          example: New York

        profileImage:
          type: string
          format: uri
          example: https://example.com/images/sarah.jpg

        pricePerSession:
          type: number
          example: 75