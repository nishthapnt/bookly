openapi: 3.0.3

info:
  title: Bookly API
  version: 1.0.0
  description: API for booking appointments with professionals

paths:
  /api/providers:
    get:
      summary: Get all public provider profiles
      responses:
        "200":
          description: A list of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - slug
                    - name
                    - title
                    - profileImage
                  properties:
                    slug:
                      type: string
                    name:
                      type: string
                    title:
                      type: string
                    profileImage:
                      type: string